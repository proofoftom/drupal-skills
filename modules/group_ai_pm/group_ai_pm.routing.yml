group_ai_pm.settings:
  path: '/admin/config/group_ai_pm/settings'
  defaults:
    _form: '\Drupal\group_ai_pm\Form\SettingsForm'
    _title: 'Group AI Project Management Settings'
  requirements:
    _permission: 'administer group_ai_pm'
  options:
    _admin_route: TRUE

group_ai_pm.dashboard:
  path: '/admin/content/project-dashboard'
  defaults:
    _controller: '\Drupal\group_ai_pm\Controller\DashboardController::content'
    _title: 'Project Dashboard'
  requirements:
    _permission: 'access group_ai_pm dashboard'
  options:
    _admin_route: TRUE

group_ai_pm.project.complete:
  path: '/admin/content/project/{project}/complete'
  defaults:
    _controller: '\Drupal\group_ai_pm\Controller\ProjectActionController::completeProject'
    _title: 'Complete Project'
  requirements:
    _custom_access: '\Drupal\group_ai_pm\Controller\ProjectActionController::completeProjectAccess'
    _csrf_token: 'TRUE'
  options:
    _admin_route: TRUE

group_ai_pm.api.ai_create:
  path: '/api/kanban/project/{project}/ai-create'
  defaults:
    _controller: '\Drupal\group_ai_pm\Controller\AiTaskController::createTask'
  methods: [POST]
  requirements:
    _permission: 'edit group_ai_pm task'
    _csrf_request_header_token: 'TRUE'
    _format: json
  options:
    _admin_route: TRUE
    parameters:
      project:
        type: entity:project
