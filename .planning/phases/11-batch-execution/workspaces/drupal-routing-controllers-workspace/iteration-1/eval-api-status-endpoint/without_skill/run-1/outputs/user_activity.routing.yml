user_activity.page:
  path: '/user/{user}/activity'
  defaults:
    _controller: '\Drupal\user_activity\Controller\UserActivityController::activityPage'
    _title_callback: '\Drupal\user_activity\Controller\UserActivityController::activityPageTitle'
  requirements:
    _permission: 'access content'
    user: \d+
  options:
    parameters:
      user:
        type: entity:user

user_activity.api:
  path: '/api/user/{user}/activity'
  defaults:
    _controller: '\Drupal\user_activity\Controller\UserActivityController::activityJson'
  requirements:
    _permission: 'access content'
    user: \d+
  options:
    parameters:
      user:
        type: entity:user
