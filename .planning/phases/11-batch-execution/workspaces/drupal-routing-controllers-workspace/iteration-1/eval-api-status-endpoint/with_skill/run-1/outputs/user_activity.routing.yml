user_activity.page:
  path: '/user/{user}/activity'
  defaults:
    _controller: '\Drupal\user_activity\Controller\UserActivityController::activityPage'
    _title_callback: '\Drupal\user_activity\Controller\UserActivityController::title'
  requirements:
    _permission: 'view user activity'
  options:
    parameters:
      user:
        type: entity:user

user_activity.json:
  path: '/api/user/{user}/activity'
  defaults:
    _controller: '\Drupal\user_activity\Controller\UserActivityController::activityJson'
  requirements:
    _permission: 'view user activity'
  options:
    parameters:
      user:
        type: entity:user
